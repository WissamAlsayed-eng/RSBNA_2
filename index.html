<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="بنك أسئلة جامعي شامل لمادة تطبيقات الإنترنت: ملخصات المحاضرات، تعاريف، أسئلة امتحانية واقعية، واختبارات تفاعلية." />
  <title>بنك أسئلة تطبيقات الإنترنت</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='4' y='4' width='56' height='56' rx='14' fill='%236366f1'/%3E%3Ctext x='32' y='44' font-size='32' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3E%D8%9F%3C/text%3E%3C/svg%3E" type="image/svg+xml" />
  <!-- الخط العربي -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- خلفية زخرفية -->
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- الترويسة -->
  <header class="site-header glass">
    <a class="brand" href="#/home">
      <span class="brand-logo">📚</span>
      <span class="brand-text">
        <strong id="brand-name">بنك أسئلة تطبيقات الإنترنت</strong>
        <small>مرجعك الشامل للمذاكرة والامتحان</small>
      </span>
    </a>
    <nav class="main-nav" id="main-nav" aria-label="التنقل الرئيسي">
      <a href="#/home" data-nav="home">الرئيسية</a>
      <a href="#/lectures" data-nav="lectures">المحاضرات</a>
      <a href="#/quiz" data-nav="quiz">اختبار تفاعلي</a>
      <a href="#/exam" data-nav="exam">نموذج الامتحان</a>
      <a href="#/search" data-nav="search">البحث</a>
    </nav>
    <button id="theme-toggle" class="icon-btn" title="تبديل الوضع الليلي / النهاري" aria-label="تبديل المظهر">
      <span class="theme-icon-dark">🌙</span>
      <span class="theme-icon-light">☀️</span>
    </button>
  </header>

  <!-- المحتوى -->
  <main id="app">
    <div id="loading" class="loading-wrap">
      <div class="spinner"></div>
      <p>جارٍ تحميل بنك الأسئلة…</p>
    </div>
    <section id="view-home" class="view" hidden></section>
    <section id="view-lectures" class="view" hidden></section>
    <section id="view-lecture" class="view" hidden></section>
    <section id="view-quiz" class="view" hidden></section>
    <section id="view-exam" class="view" hidden></section>
    <section id="view-search" class="view" hidden></section>
  </main>

  <!-- التذييل -->
  <footer class="site-footer">
    <p>بنك أسئلة جامعي — مادة تطبيقات الإنترنت · جميع الأسئلة والملخصات مستخرجة من محاضرات المقرر (ملفات PDF).</p>
    <a class="footer-brand" href="#" aria-label="تصميم وتطوير وسام السيد محمد">
      <span class="footer-brand-icon" aria-hidden="true">⌘</span>
      <span>تصميم وتطوير: وسام السيد محمد</span>
    </a>
  </footer>

  <!-- نسخة مدمجة من البيانات للعمل بدون خادم (فتح الملف مباشرة) -->
  <script src="data/embed.js"></script>
  <script src="script.js"></script>
</body>
</html>
